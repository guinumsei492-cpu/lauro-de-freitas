<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lauro de Freitas Oficial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="background:#f4f4f4; font-family:'Poppins', sans-serif; margin:0; padding:0;">

    <header style="background:#004aad; color:white; padding:40px 20px; text-align:center;">
        <h1 style="margin:0;">Lauro de Freitas 🌴</h1>
        <p style="margin:5px 0 0;">Emancipada em 31 de Julho de 1962</p>
    </header>

    <div style="max-width:1000px; margin:40px auto; padding:0 20px;">
        <h2 style="text-align:center; color:#333;">Pontos Turísticos Reais</h2>
        
        <!-- O ID TEM QUE SER EXATAMENTE ESSE: lista-final -->
        <div id="lista-final" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:30px; margin-top:30px;">
            <!-- O JAVASCRIPT VAI COLOCAR AS FOTOS AQUI -->
        </div>
    </div>

    <footer style="text-align:center; padding:30px; background:#333; color:white; margin-top:50px;">
        <p>&copy; 2026 - Lauro de Freitas City</p>
    </footer>

    <!-- v=500 força a atualização total -->
    <script src="script.js?v=500"></script>
</body>
</html>
